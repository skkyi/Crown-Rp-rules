<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قوانين مدينة كراون 💎</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <div class="content-header" style="position: sticky; top: 0; z-index: 100; background: inherit; padding-bottom: 10px;">
            <h1 class="main-title" id="main-title">قوانين مدينة كراون</h1>
            
            <button id="back-button" class="back-btn" onclick="goBack()" style="display:none; width: 100%; margin-top: 10px;">🔙 رجوع للخلف</button>
        </div>

        <div id="content-area" class="content-body">
            </div>

        <div class="footer" style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888;">
            <hr style="border: 0.1px solid #333; margin: 20px 0;">
        </div>
    </div>

    <script src="city_rules.js"></script>
    <script src="discord_rules.js"></script>
    <script src="ministry_rules.js"></script>
    <script src="gang_rules.js"></script> 
    <script src="main_menu.js"></script>

    <script src="script.js"></script>

    <script>
        // تشغيل القائمة الرئيسية فور تحميل الصفحة
        window.onload = () => {
            // نتحقق من وجود الدالة قبل التشغيل لتجنب الأخطاء
            if (typeof renderContent === "function") {
                // 'main' هي المفتاح الأول في mainMenuData
                renderContent('main', mainMenuData);
            } else {
                console.error("تنبيه: دالة renderContent غير موجودة في script.js - تأكد من رفع الملف بشكل صحيح");
            }
        };
    </script>
</body>
</html>
