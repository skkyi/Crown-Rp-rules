<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قوانين سيرفر كراون</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="main-view">
            <h1 class="main-title">سيرفر كراون - القوانين</h1>
            <div class="grid-container">
                <div class="card" onclick="showContent('city-rules')">🏙️ قـوانين الـمديـنة ⤥</div>
                <div class="card" onclick="showContent('ministry-main')">👑 قـوانين الـوزارات ⤥</div>
                <div class="card" onclick="showContent('discord-rules')">📱 قـوانين الـدسكورد ⤥</div>
                <div class="card" onclick="showContent('gang-rules')">🔪 قوانين المنظمات والعصابات ⤥</div>
            </div>
        </div>

        <div id="content-view" class="hidden">
            <div class="content-header">
                <h2 id="content-title">عنوان القسم</h2>
                <button class="back-btn" onclick="showMain()">رجوع</button>
            </div>
            <div id="content-text" class="content-body">
                </div>
        </div>
    </div>

    <script src="city_rules.js"></script>
    <script src="ministry_rules.js"></script>
    <script src="gang_rules.js"></script>
    <script src="discord_rules.js"></script>

    <script src="script.js"></script>
</body>
</html>
